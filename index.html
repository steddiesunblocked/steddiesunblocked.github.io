<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>St Eddies Unblocked Games</title>
<link rel="icon" href="/favicon.ico">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
/* Reset */
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; height:100%; overflow-x:hidden; }

/* Background GIF */
body {
  font-family: Arial, Helvetica, sans-serif;
  background: url('/assets/purple_horizontal_clean_background.gif') center center / cover no-repeat;
  color:white;
}

/* Header */
header {
  width:100%;
  background: rgba(0,0,0,0.6);
  display:flex;
  justify-content: space-between;
  align-items:center;
  padding:10px 20px;
  position: fixed;
  top:0;
  z-index:10;
}

.logo img { height:50px; }

/* Search input */
.search input {
  padding:8px 12px;
  border-radius:6px;
  border:none;
  font-size:16px;
}

/* Panic button */
header button { padding:6px 12px; border:none; border-radius:6px; cursor:pointer; }

/* Main grid for game icons */
main {
  margin-top:80px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:20px;
  max-width:1200px;
  margin-left:auto;
  margin-right:auto;
  padding:20px;
}

/* Individual game tile */
.game {
  background: rgba(0,0,0,0.7);
  padding:15px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:.2s;
}
.game:hover { transform: scale(1.05); background: rgba(50,50,50,0.9); }
.game img { width:64px; height:64px; image-rendering:pixelated; }
.name { margin-top:8px; font-size:14px; }

/* Player iframe */
#player {
  display:block;
  width:100%;
  max-width:640px;
  height:640px;
  margin:40px auto;
  border:none;
  background:black;
}

/* Panic overlay */
.panic {
  position:fixed;
  top:0; left:0;
  width:100vw; height:100vh;
  display:none;
  z-index:9999;
}
.panic img {
  width:100%; height:100%; object-fit:cover;
}
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="/assets/steddiesunblocked_logo_pulse.gif" alt="St Eddies Logo">
  </div>
  <div class="search"><input id="search" placeholder="Search games..."></div>
  <button onclick="panic()">Panic</button>
</header>

<main id="games">
  <a class="game" data-name="2048" href="/games/2048/page.html">
    <img src="/favicon.ico" alt="2048">
    <div class="name">2048</div>
  </a>
  <a class="game" data-name="Tetris" href="#">
    <img src="/favicon.ico" alt="Tetris">
    <div class="name">Tetris</div>
  </a>
  <a class="game" data-name="Run 3" href="#">
    <img src="/favicon.ico" alt="Run 3">
    <div class="name">Run 3</div>
  </a>
</main>

<!-- Player iframe -->
<iframe id="player" src="/games/2048/index.html"></iframe>

<!-- Panic overlay -->
<div id="panic" class="panic">
  <img src="/assets/edulink_fake.png" alt="Panic">
</div>

<script>
// Search filter
const search = document.getElementById("search");
search.addEventListener("input", () => {
  const filter = search.value.toLowerCase();
  document.querySelectorAll(".game").forEach(game => {
    const name = game.dataset.name.toLowerCase();
    game.style.display = name.includes(filter) ? "block" : "none";
  });
});

// Panic function
function panic() { document.getElementById("panic").style.display="block"; }

// Panic toggle with Ctrl+F
document.addEventListener("keydown", e => {
  if(e.ctrlKey && e.key.toLowerCase() === "f") {
    e.preventDefault();
    panic();
  }
});
</script>

</body>
</html>
