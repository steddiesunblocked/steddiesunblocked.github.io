<!doctype html>
<html lang="en">

<head>
<meta charset="utf-8">

<title>EduLink One</title>
<link rel="icon" href="/favicon.ico">

<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preload" as="image" href="/assets/edulink_fake.png">

<style>

/* reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
}

html,body{
height:100%;
overflow-x:hidden;
font-family:Arial, Helvetica, sans-serif;
}

/* background */
body{
background:url("/assets/purple_horizontal_clean_background.gif") center center / cover no-repeat fixed;
color:white;
}

/* header */
header{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 20px;
background:rgba(0,0,0,0.65);
position:fixed;
top:0;
width:100%;
z-index:10;
}

/* logo */
.logo img{
height:55px;
}

/* search */
.search input{
padding:8px 12px;
border-radius:6px;
border:none;
font-size:15px;
}

/* panic area */
.panic-controls{
display:flex;
align-items:center;
gap:10px;
}

.panic-controls button{
padding:6px 12px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.panic-controls span{
font-size:13px;
opacity:0.85;
}

/* game grid */

.games{
margin-top:110px;
max-width:1200px;
margin-left:auto;
margin-right:auto;

display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:20px;

padding:20px;
}

/* game tile */

.game{
background:rgba(0,0,0,0.7);
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:.2s;
text-decoration:none;
color:white;
}

.game:hover{
transform:scale(1.05);
background:rgba(40,40,40,0.9);
}

.game img{
width:64px;
height:64px;
image-rendering:pixelated;
}

.name{
margin-top:8px;
font-size:14px;
}

/* panic overlay */

#panic{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
display:none;
z-index:99999;
}

#panic img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>


<body>

<header>

<div class="logo">
<img src="/assets/steddiesunblocked_logo_pulse.gif">
</div>

<div class="search">
<input id="search" placeholder="Search games...">
</div>

<div class="panic-controls">
<button onclick="togglePanic()">Panic</button>
<span>Ctrl + F to Toggle</span>
</div>

</header>


<div class="games" id="games">

<a class="game" data-name="2048" href="/games/2048/page.html">
<img src="/games/2048/favicon.ico">
<div class="name">2048</div>
</a>

<!-- add more games like this -->

</div>


<div id="panic">
<img src="/assets/edulink_fake.png">
</div>


<script>

/* search */

const search=document.getElementById("search")

search.addEventListener("input",()=>{

let filter=search.value.toLowerCase()

document.querySelectorAll(".game").forEach(game=>{

let name=game.dataset.name.toLowerCase()

game.style.display = name.includes(filter) ? "block" : "none"

})

})


/* panic toggle */

const panic=document.getElementById("panic")

function togglePanic(){

panic.style.display =
panic.style.display === "block" ? "none" : "block"

}


/* ctrl+f toggle */

document.addEventListener("keydown",e=>{

if(e.ctrlKey && e.key.toLowerCase()==="f"){

e.preventDefault()

togglePanic()

}

})

</script>

</body>
</html>
