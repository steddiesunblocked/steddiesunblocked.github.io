<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<title>St Eddies Unblocked Games</title>

<link rel="icon" href="/games/2048/favicon.ico">

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0f0f0f;
color:white;
}

header{
text-align:center;
padding:30px 10px;
}

.logo{
font-size:38px;
font-weight:bold;
}

.search{
margin-top:15px;
}

.search input{
width:300px;
max-width:80%;
padding:10px;
border-radius:6px;
border:none;
font-size:16px;
}

.games{
padding:30px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:20px;
max-width:1000px;
margin:auto;
}

.game{
background:#1a1a1a;
padding:15px;
border-radius:10px;
text-align:center;
cursor:pointer;
transition:.2s;
}

.game:hover{
transform:scale(1.05);
background:#222;
}

.game img{
width:64px;
height:64px;
image-rendering:pixelated;
}

.name{
margin-top:8px;
font-size:14px;
}

.panic{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
display:none;
z-index:999999;
}

.panic img{
width:100%;
height:100%;
object-fit:cover;
}

</style>

</head>

<body>

<header>

<div class="logo">St Eddies Unblocked Games</div>

<div class="search">
<input id="search" placeholder="Search games...">
</div>

</header>


<div class="games" id="games">

<a class="game" data-name="2048" href="/games/2048/page.html">
<img src="/games/2048/favicon.ico">
<div class="name">2048</div>
</a>

<!-- Example future games -->

<a class="game" data-name="tetris" href="#">
<img src="/assets/game_placeholder.png">
<div class="name">Tetris</div>
</a>

<a class="game" data-name="run3" href="#">
<img src="/assets/game_placeholder.png">
<div class="name">Run 3</div>
</a>

</div>


<div id="panic" class="panic">
<img src="/assets/edulink_fake.png">
</div>


<script>

const search=document.getElementById("search")

search.addEventListener("input",()=>{

let filter=search.value.toLowerCase()

document.querySelectorAll(".game").forEach(game=>{

let name=game.dataset.name

if(name.includes(filter)){
game.style.display="block"
}else{
game.style.display="none"
}

})

})


function panic(){
document.getElementById("panic").style.display="block"
}

document.addEventListener("keydown",e=>{

if(e.key==="Escape"){
panic()
}

})

</script>

</body>
</html>
