<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>St Eddies Unblocked</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
color:#fff;
background:url("/assets/purple_horizontal_clean_background.gif") center/cover no-repeat fixed;
overflow-x:hidden;
}

#coreBanner{
position:fixed;
top:0;left:0;right:0;
height:54px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 12px;
background:rgba(10,6,22,.8);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,.12);
z-index:9999;
}

#brandLeft{
display:flex;
align-items:center;
gap:10px;
}

#brandLeft img{
height:34px;
}

#bannerTitle{
font-weight:700;
font-size:14px;
}

#bannerRight{
display:flex;
gap:10px;
}

.pill{
height:34px;
padding:0 12px;
border-radius:999px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.06);
color:#fff;
cursor:pointer;
font-weight:600;
}

.pill:hover{
background:rgba(255,255,255,.1);
}

.danger{
background:rgba(255,80,80,.16);
}

#app{
padding-top:54px;
}

.wrap{
max-width:1100px;
margin:auto;
padding:20px;
}

#hero{
display:flex;
flex-direction:column;
align-items:center;
gap:10px;
}

#heroLogo{
width:min(420px,80vw);
}

#searchRow{
width:min(760px,96vw);
display:flex;
gap:10px;
margin-top:10px;
}

#searchInput{
flex:1;
height:44px;
border-radius:12px;
border:1px solid rgba(255,255,255,.16);
background:rgba(10,6,22,.55);
color:#fff;
padding:0 12px;
}

#searchBtn{
height:44px;
padding:0 14px;
border-radius:12px;
border:1px solid rgba(255,255,255,.16);
background:rgba(255,255,255,.08);
color:#fff;
cursor:pointer;
}

#cats{
display:flex;
gap:10px;
flex-wrap:wrap;
justify-content:center;
margin:14px 0 20px;
}

.catBtn{
padding:10px 12px;
border-radius:999px;
border:1px solid rgba(255,255,255,.16);
background:rgba(10,6,22,.45);
cursor:pointer;
}

.catBtn.active{
background:rgba(255,255,255,.12);
}

#grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
}

.tile{
display:block;
text-decoration:none;
color:#fff;
border-radius:16px;
padding:14px;
border:1px solid rgba(255,255,255,.14);
background:rgba(10,6,22,.45);
backdrop-filter:blur(10px);
cursor:pointer;
}

.tile:hover{
background:rgba(255,255,255,.08);
}

.tileTitle{
font-weight:800;
margin-bottom:6px;
}

.tileDesc{
opacity:.85;
font-size:13px;
}

#gamePlayer{
display:none;
margin:30px auto;
width:900px;
height:600px;
border-radius:16px;
border:3px solid rgba(255,255,255,.2);
overflow:hidden;
background:black;
}

#gameFrame{
width:100%;
height:100%;
border:none;
}

body.stealth #app{display:none;}

#stealthFrame{
display:none;
position:fixed;
inset:0;
width:100%;
height:100%;
border:0;
background:#fff;
z-index:9998;
}

body.stealth #stealthFrame{display:block;}

</style>
</head>

<body>

<iframe id="stealthFrame" src="/assets/edulink_fake.png"></iframe>

<div id="coreBanner">

<div id="brandLeft">
<img src="/assets/steddiesunblocked_logo_pulse.gif">
<div id="bannerTitle">St Eddies Unblocked</div>
</div>

<div id="bannerRight">
<button class="pill" id="stealthBtn">Stealth</button>
<button class="pill danger" id="panicBtn">Panic</button>
</div>

</div>

<div id="app">

<div class="wrap">

<div id="hero">

<img id="heroLogo" src="/assets/steddiesunblocked_logo_pulse.gif">

<div id="searchRow">
<input id="searchInput" placeholder="Search games...">
<button id="searchBtn">Search</button>
</div>

<div id="cats">
<button class="catBtn active" data-cat="all">All</button>
<button class="catBtn" data-cat="games">Games</button>
<button class="catBtn" data-cat="apps">Apps</button>
<button class="catBtn" data-cat="tools">Tools</button>
</div>

</div>

<div id="grid">

<div class="tile" data-cat="games" onclick="loadGame('games/2048/index.html')">
<div class="tileTitle">2048</div>
<div class="tileDesc">Sliding tile puzzle game</div>
</div>

</div>

<div id="gamePlayer">
<iframe id="gameFrame"></iframe>
</div>

</div>
</div>

<script>

const body=document.body;
const stealthBtn=document.getElementById("stealthBtn");
const panicBtn=document.getElementById("panicBtn");

function setStealth(on){
body.classList.toggle("stealth",on);
}

stealthBtn.onclick=()=>setStealth(!body.classList.contains("stealth"));

panicBtn.onclick=()=>{
window.scrollTo(0,0);
setStealth(true);
};

window.addEventListener("keydown",e=>{
if(e.ctrlKey&&e.key==="e"){
e.preventDefault();
setStealth(!body.classList.contains("stealth"));
}
if(e.key==="Escape")setStealth(false);
});

function loadGame(url){

const player=document.getElementById("gamePlayer");
const frame=document.getElementById("gameFrame");

frame.src=url;
player.style.display="block";

window.scrollTo({
top:player.offsetTop-60,
behavior:"smooth"
});

}

</script>

</body>
</html>
