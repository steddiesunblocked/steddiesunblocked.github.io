<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>2048 | St Eddies Unblocked Games</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#111;
color:white;
}

header{
background:#1a1a1a;
padding:15px;
display:flex;
align-items:center;
gap:20px;
}

.back{
font-size:22px;
cursor:pointer;
text-decoration:none;
color:white;
}

.logo{
font-weight:bold;
font-size:22px;
}

.main{
display:grid;
grid-template-columns:200px 1fr 200px;
gap:15px;
padding:20px;
}

.sidebar{
display:flex;
flex-direction:column;
gap:10px;
}

.game-card{
background:#1f1f1f;
padding:10px;
border-radius:6px;
text-align:center;
cursor:pointer;
}

.game-card img{
width:100%;
border-radius:4px;
}

.player-area{
text-align:center;
}

.game-frame{
width:640px;
height:640px;
border:none;
background:black;
}

.launch-btn{
margin-top:10px;
padding:12px 30px;
font-size:18px;
background:#2ecc71;
border:none;
border-radius:6px;
cursor:pointer;
}

.description{
margin-top:30px;
background:#1a1a1a;
padding:20px;
border-radius:6px;
}

.bottom-games{
margin-top:20px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:10px;
}

.panic{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:black;
display:none;
z-index:999999;
}

.panic img{
width:100%;
height:100%;
object-fit:cover;
}

</style>
</head>

<body>

<header>
<a class="back" href="/">←</a>
<div class="logo">2048</div>
<button onclick="panic()">Panic</button>
</header>

<div class="main">

<div class="sidebar">

<div class="game-card">
<img src="/games/2048/favicon.ico">
<div>2048</div>
</div>

<div class="game-card">
<img src="/assets/game_placeholder.png">
<div>Tetris</div>
</div>

</div>


<div class="player-area">

<iframe id="gameFrame" class="game-frame" src=""></iframe>

<br>

<button class="launch-btn" onclick="launchGame()">Launch Game</button>

</div>


<div class="sidebar">

<div class="game-card">
<img src="/assets/game_placeholder.png">
<div>Slope</div>
</div>

<div class="game-card">
<img src="/assets/game_placeholder.png">
<div>Run 3</div>
</div>

</div>

</div>


<div class="description">

<h2>About 2048</h2>

<p>
2048 is a puzzle game where you slide tiles together to combine numbers.
Keep merging tiles until you reach the legendary <b>2048 block</b>.
Simple to learn but extremely addictive.
</p>

<h3>More Games</h3>

<div class="bottom-games">

<div class="game-card">
<img src="/assets/game_placeholder.png">
<div>Retro Bowl</div>
</div>

<div class="game-card">
<img src="/assets/game_placeholder.png">
<div>Run 3</div>
</div>

<div class="game-card">
<img src="/assets/game_placeholder.png">
<div>Basketball Stars</div>
</div>

</div>

</div>


<div id="panic" class="panic">
<img src="/assets/edulink_fake.png">
</div>

<script>

function launchGame(){
document.getElementById("gameFrame").src="/games/2048/index.html";
}

function panic(){
document.getElementById("panic").style.display="block";
}

document.addEventListener("keydown",function(e){
if(e.key==="Escape"){
panic();
}
});

</script>

</body>
</html>
